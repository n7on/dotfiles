# ── Prefix ────────────────────────────────────────────────────────────────────
# Use C-a instead of C-b (less finger strain, like GNU Screen)
unbind C-b
set -g prefix C-f
bind C-f send-prefix          # C-f C-f sends literal C-f to the shell

# ── General ───────────────────────────────────────────────────────────────────
set -g base-index 1           # windows start at 1, not 0
setw -g pane-base-index 1     # panes too
set -g renumber-windows on    # close a window → no gaps in numbering
set -s escape-time 0          # no delay after Escape (critical for vim)
set -g history-limit 50000
set -g focus-events on        # lets vim react to focus changes
set -g pane-border-style        "fg=colour235"
set -g pane-active-border-style "fg=colour235"
set -g mouse on

# ── Copy mode ─────────────────────────────────────────────────────────────────
bind Space copy-mode
unbind -T copy-mode MouseDown1Pane
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection

# ── Color fix ─────────────────────────────────────────────────────────────────
set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:Tc" 

# ── Vi mode ───────────────────────────────────────────────────────────────────
setw -g mode-keys vi

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Pane navigation (vim-style) ────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Splits ────────────────────────────────────────────────────────────────────
# Intuitive: | splits vertically, - splits horizontally
# Both open in the current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Window navigation ─────────────────────────────────────────────────────────
bind -r n next-window
bind -r p previous-window

# ── Appearance — minimal ──────────────────────────────────────────────────────
set -g status-style           "bg=default,fg=white"   # transparent status bar
set -g status-left            ""                       # no session name clutter
set -g status-right           " #H "                  # just the hostname
set -g status-right-length    20
set -g status-justify         left

set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style  "fg=white,bold"
set -g window-status-style          "fg=colour240"    # dim inactive windows

set -g message-style "bg=default,fg=white"

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
bind-key . command-prompt -p "Pane name:" "select-pane -T '%%'"
